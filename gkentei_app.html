<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>G検定 問題集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f0f2f5;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:#1a1a2e}
/* ===== LAYOUT ===== */
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#fff}
/* ===== TOP BAR ===== */
.topbar{background:linear-gradient(135deg,#1a237e 0%,#283593 100%);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.topbar-back{background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-title{color:#fff;font-size:15px;font-weight:700;flex:1;letter-spacing:0.5px}
.topbar-badge{background:rgba(255,255,255,0.2);color:#fff;font-size:11px;padding:3px 10px;border-radius:12px;white-space:nowrap}
/* ===== HOME ===== */
.home{padding:20px 16px;flex:1}
.home-hero{background:linear-gradient(135deg,#1a237e,#3949ab);border-radius:16px;padding:24px;margin-bottom:20px;color:#fff;text-align:center}
.home-hero h1{font-size:20px;font-weight:700;margin-bottom:4px}
.home-hero p{font-size:12px;opacity:0.85;margin-bottom:16px}
.home-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-card{background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 6px;text-align:center}
.stat-num{font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;opacity:0.8;margin-top:2px}
.section-title{font-size:13px;font-weight:700;color:#5c6bc0;letter-spacing:1px;text-transform:uppercase;margin:0 0 10px;padding-left:4px}
.mode-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.mode-card{border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;border:none;text-align:left;width:100%;transition:transform 0.15s,box-shadow 0.15s}
.mode-card:active{transform:scale(0.97)}
.mode-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.mode-info h3{font-size:15px;font-weight:700;margin-bottom:3px}
.mode-info p{font-size:12px;opacity:0.75;line-height:1.4}
.mode-all{background:linear-gradient(135deg,#e8eaf6,#c5cae9);color:#283593}
.mode-all .mode-icon{background:#3949ab;color:#fff}
.mode-random{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);color:#1b5e20}
.mode-random .mode-icon{background:#43a047;color:#fff}
.mode-weak{background:linear-gradient(135deg,#fff3e0,#ffe0b2);color:#bf360c}
.mode-weak .mode-icon{background:#ef6c00;color:#fff}
.mode-chapter{background:linear-gradient(135deg,#e3f2fd,#bbdefb);color:#0d47a1}
.mode-chapter .mode-icon{background:#1976d2;color:#fff}
.chapter-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.ch-item{background:#f8f9fe;border:1.5px solid #e8eaf6;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.15s}
.ch-item:active{transform:scale(0.97);background:#e8eaf6}
.ch-num{width:32px;height:32px;background:#3949ab;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ch-info{flex:1}
.ch-name{font-size:13px;font-weight:500;margin-bottom:2px}
.ch-meta{font-size:11px;color:#888}
.ch-arrow{color:#bbb;font-size:18px}
/* ===== QUIZ ===== */
.quiz-header{padding:12px 16px;background:#f8f9fe;border-bottom:1px solid #e8eaf6}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.progress-bar{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#3949ab,#5c6bc0);border-radius:3px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.prog-text{font-size:12px;color:#666;white-space:nowrap}
.quiz-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.tag-chapter{background:#e8eaf6;color:#3949ab}
.tag-mode{background:#e8f5e9;color:#2e7d32}
.tag-weak{background:#fff3e0;color:#e65100}
/* question area */
.quiz-body{padding:16px;flex:1}
.q-number{font-size:12px;font-weight:700;color:#5c6bc0;margin-bottom:8px;letter-spacing:0.5px}
.q-text{font-size:14px;line-height:1.75;color:#1a1a2e;margin-bottom:20px;font-weight:500}
.choices{display:flex;flex-direction:column;gap:9px}
.choice-btn{border:2px solid #e0e4f4;border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;background:#fff;width:100%;text-align:left;transition:all 0.2s;position:relative}
.choice-btn:active{transform:scale(0.98)}
.choice-btn:not(.answered):hover{border-color:#5c6bc0;background:#f0f2ff}
.choice-lbl{width:26px;height:26px;border-radius:50%;border:2px solid #bbb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#888;transition:all 0.2s;margin-top:1px}
.choice-text{font-size:13px;line-height:1.65;color:#1a1a2e;padding-top:2px}
.choice-btn.correct{border-color:#2e7d32;background:#f1f8e9}
.choice-btn.correct .choice-lbl{background:#2e7d32;border-color:#2e7d32;color:#fff}
.choice-btn.correct .choice-text{color:#1b5e20;font-weight:500}
.choice-btn.wrong{border-color:#c62828;background:#ffebee}
.choice-btn.wrong .choice-lbl{background:#c62828;border-color:#c62828;color:#fff}
.choice-btn.wrong .choice-text{color:#b71c1c}
.choice-btn.dimmed{opacity:0.4}
.choice-btn.highlight-correct{border-color:#2e7d32;background:#f1f8e9}
.choice-btn.highlight-correct .choice-lbl{border-color:#2e7d32;color:#2e7d32}
/* result */
.result-panel{margin-top:16px;border-radius:14px;overflow:hidden;border:2px solid #e0e4f4;animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-header{padding:12px 16px;display:flex;align-items:center;gap:10px}
.result-header.ok{background:#e8f5e9;border-bottom:2px solid #c8e6c9}
.result-header.ng{background:#ffebee;border-bottom:2px solid #ffcdd2}
.result-icon{font-size:24px}
.result-verdict{font-size:16px;font-weight:700}
.result-verdict.ok{color:#2e7d32}
.result-verdict.ng{color:#c62828}
.result-correct-ans{margin-left:auto;font-size:12px;color:#666}
.result-correct-ans span{font-weight:700;color:#2e7d32}
.result-body{padding:14px 16px;background:#fafbff}
.exp-title{font-size:11px;font-weight:700;color:#888;letter-spacing:1px;margin-bottom:8px}
.exp-text{font-size:13px;line-height:1.75;color:#333}
.exp-tip{margin-top:10px;background:#e3f2fd;border-left:3px solid #1976d2;padding:8px 12px;border-radius:0 8px 8px 0}
.exp-tip p{font-size:12px;color:#1565c0;line-height:1.65}
/* nav */
.quiz-nav{padding:12px 16px;display:flex;gap:10px;background:#fff;border-top:1px solid #f0f0f0;position:sticky;bottom:0}
.btn-next{flex:2;padding:13px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#3949ab,#5c6bc0);color:#fff;transition:all 0.2s;letter-spacing:0.5px}
.btn-next:disabled{background:#bdbdbd;cursor:default}
.btn-next:not(:disabled):active{transform:scale(0.97)}
.btn-skip{flex:1;padding:13px;border-radius:11px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #e0e4f4;background:#f8f9fe;color:#888;transition:all 0.2s}
.btn-skip:active{transform:scale(0.97)}
/* ===== SCORE ===== */
.score-screen{padding:24px 16px;text-align:center;flex:1}
.score-ring{width:120px;height:120px;margin:0 auto 20px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-ring-num{font-size:28px;font-weight:700;color:#3949ab;display:block}
.score-ring-den{font-size:12px;color:#888;display:block}
.score-grade{font-size:20px;font-weight:700;margin-bottom:6px}
.score-grade.S{color:#ff6f00}
.score-grade.A{color:#2e7d32}
.score-grade.B{color:#1565c0}
.score-grade.C{color:#6a1b9a}
.score-grade.D{color:#b71c1c}
.score-sub{font-size:13px;color:#888;margin-bottom:20px}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;text-align:left}
.score-card{background:#f8f9fe;border:1.5px solid #e8eaf6;border-radius:12px;padding:12px}
.sc-label{font-size:11px;color:#888;margin-bottom:4px}
.sc-val{font-size:20px;font-weight:700}
.sc-val.green{color:#2e7d32}
.sc-val.red{color:#c62828}
.sc-val.orange{color:#e65100}
.score-btns{display:flex;flex-direction:column;gap:10px}
.score-btn-primary{padding:14px;background:linear-gradient(135deg,#3949ab,#5c6bc0);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px}
.score-btn-secondary{padding:13px;background:#f8f9fe;border:1.5px solid #e0e4f4;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;color:#3949ab}
/* ===== WEAK LIST ===== */
.weak-screen{padding:16px;flex:1}
.weak-count{background:#fff3e0;border:1.5px solid #ffe0b2;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#e65100;text-align:center;font-weight:500}
.weak-item{background:#fff;border:1.5px solid #ffe0b2;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all 0.15s}
.weak-item:active{transform:scale(0.98)}
.weak-badge{background:#ef6c00;color:#fff;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.weak-q{font-size:13px;color:#333;line-height:1.5;flex:1}
.weak-ch{font-size:11px;color:#888;margin-top:3px}
.no-weak{text-align:center;padding:40px 20px;color:#888}
.no-weak-icon{font-size:48px;margin-bottom:12px}
.no-weak p{font-size:14px;line-height:1.6}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ============================================================
// QUESTION DATABASE (全問題 - 書籍「徹底攻略 G検定問題集 第3版」より)
// ============================================================
const QDB = [
// ===== 第1章 人工知能とは =====
{id:1,ch:"第1章 人工知能とは",q:"2024年現在の人工知能に関する説明として、最も不適切なものを選べ。",c:["現在の人工知能は、音声を認識することができる","現在の人工知能は、データをその特徴にしたがって分類することができる","現在の人工知能は、タスクの目的自体を理解した上での自律的な判断を行うことができる","現在の人工知能は、データをもとにした数値予測を行うことができる"],a:2,exp:"AIは音声認識(A)・データ分類(B)・数値予測(D)を実現していますが、タスクの目的自体を理解した上で自律的に判断する「強いAI」は現時点では実現していません(C)。機械学習はパターンを見出して判断しますが、目的を自ら理解して行動することはできません。",tip:"人工知能とは何か、技術的に可能なことを確認しておきましょう。"},
{id:2,ch:"第1章 人工知能とは",q:"AI効果に関する説明として、最も適切なものを選べ。",c:["AI効果とは、AIが普及することで、AIではなく人間にしかできないことや、本来の人間らしさといった特性こそが重要であると感じる心理効果のことである","AI効果とは、AIが実現しているのは自動化などの単純な処理であり、知能によるものではないと考える心理効果のことである","AI効果とは、周囲からの期待や関心があることで、人工知能のパフォーマンスを高く評価してしまう心理効果のことである","AI効果とは、AIロボットの容姿や動き、音声などが人間に非常に近くなることで、違和感や恐怖などの感情が芽生える効果のことである"],a:1,exp:"AI効果とは、AIが実現している技術に対し「単純な処理であり知能によるものではない」と矮小化する心理効果です(B)。Aは人間らしさの価値見直し、Cはプラセボ的過大評価、Dは不気味の谷(アンキャニーバレー)の説明です。",tip:"「AI効果」という言葉の意味を押さえ、どのような心理効果かを理解しておきましょう。"},
{id:3,ch:"第1章 人工知能とは",q:"第一次AIブームにおいて解くことができたトイ・プロブレムの例として、最も不適切なものを選べ。",c:["子供が学校で習うような簡単な代数の問題","チェスやオセロなどのようにルールや設定が決まっている問題","ハノイの塔など簡単な手続きで解くことができる問題","特定の専門知識が必要な領域についての質問に回答する問題"],a:3,exp:"第一次AIブームで解けたトイ・プロブレムには代数(A)・ルールベースゲーム(B)・ハノイの塔(C)があります。特定の専門知識が必要な問題(D)は第二次AIブームのエキスパートシステムが扱うようになりました。",tip:"第一次AIブームでどのような研究が行われたかを整理し、トイ・プロブレムの例を答えられるようにしましょう。"},
{id:4,ch:"第1章 人工知能とは",q:"人工知能に対処させるべき事柄を決めるのは難しいということを表す用語として、最も適切なものを選べ。",c:["シンボルグラウンディング問題","次元の呪い","知識獲得のボトルネック","フレーム問題"],a:3,exp:"フレーム問題とは、AIに「何に対処すべきか」を決めることが非常に難しいという問題です。現実では行動によって変化する事柄と変化しない事柄が膨大にあり、AIに自動判断させることは困難です。シンボルグラウンディング(A)は記号と現実の対応付け、次元の呪い(B)は高次元データの扱い、知識獲得のボトルネック(C)は専門知識教え込みの困難さです。",tip:"フレーム問題、シンボルグラウンディング問題など、AIの古典的な問題を区別して覚えましょう。"},
{id:5,ch:"第1章 人工知能とは",q:"強いAIと弱いAIの違いに関する記述として、最も適切なものを選べ。",c:["強いAIは正確な将来予測ができるが、弱いAIは正確な将来予測ができない","強いAIは深層学習モデルによって構築されるが、弱いAIは統計モデルによって構築される","強いAIは人間のような自意識を持って総合的な判断ができるが、弱いAIは特定のタスクのみを処理することに特化している","強いAIの例として敵対的生成ネットワークのような画像生成AIが、弱いAIの例としてGoogLeNetのような画像認識AIがあげられる"],a:2,exp:"強いAI(汎用AI)は人間のような自意識・意図を持ちあらゆる知的作業をこなせます。弱いAI(特化型AI)は特定タスクのみに特化しています(C)。GAN・GoogLeNetともに現時点では弱いAIです(D)。構築手法の差(B)や将来予測能力の差(A)は定義とは関係ありません。",tip:"強いAI・弱いAIの概念的定義を押さえましょう。現在存在するすべてのAIは「弱いAI」です。"},
{id:6,ch:"第1章 人工知能とは",q:"機械翻訳に関する以下の記述を読み、空欄（ア）〜（ウ）に入る語句として最も適切な組み合わせを選べ。1970年代後半は（ア）機械翻訳が主流であったが、1990年代以降は（イ）機械翻訳が主流となった。しかし（イ）機械翻訳では一般常識をうまく扱うことができず、このことを知識獲得の（ウ）と呼んだ。",c:["（ア）ルールベース （イ）コーパス （ウ）レイテンシ","（ア）エキスパート （イ）コーパス （ウ）レイテンシ","（ア）エキスパート （イ）統計的 （ウ）ボトルネック","（ア）ルールベース （イ）統計的 （ウ）ボトルネック"],a:3,exp:"1970年代後半はルールベース機械翻訳が主流でした。1990年代以降は大量のコーパスから確率的に翻訳する統計的機械翻訳が主流となりました。しかし統計的機械翻訳では常識を扱えず、この困難を「知識獲得のボトルネック」と呼びました(D)。",tip:"機械翻訳の歴史と各手法の特徴を整理しておきましょう。"},
// ===== 第2章 人工知能をめぐる動向 =====
{id:7,ch:"第2章 人工知能をめぐる動向",q:"第一次AIブームで主に研究されたものとして、最も適切なものを選べ。",c:["エキスパートシステム","ディープラーニング","探索・推論","知識ベース"],a:2,exp:"第一次AIブームでは探索・推論を行うアルゴリズムによってタスクを解こうとしました(C)。エキスパートシステム(A)・知識ベース(D)は第二次AIブーム、ディープラーニング(B)は第三次AIブームの技術です。",tip:"各AIブームにおける技術について覚えておきましょう。"},
{id:8,ch:"第2章 人工知能をめぐる動向",q:"1つのスタートと2つのゴールが設定された迷路を、探索木のアルゴリズムで解くことを考える。このとき、探索木の幅優先探索に関する説明として、最も不適切なものを選べ。",c:["幅優先探索では、各ノードをスタート地点に近い順番で探索する","幅優先探索では、同じ探索木を探索する場合、一般に深さ優先探索よりもメモリ消費量が大きくなることが多い","幅優先探索では、最短経路でゴールにたどり着く解を発見できないことがある","幅優先探索では、解を必ず発見できる"],a:2,exp:"幅優先探索はスタート地点に近いノードから順に探索します(A)。メモリ消費が多い(B)・解を必ず発見できる(D)は正しい説明です。幅優先探索では最短距離でゴールにたどり着く解を必ず発見できます(C)。",tip:"探索木における探索手法の種類とその特徴を把握しておきましょう。"},
{id:9,ch:"第2章 人工知能をめぐる動向",q:"完全情報ゲームに用いられるアルゴリズムに関する以下の記述を読み、空欄（ア）に入る語句として最も適切なものを選べ。（ア）は、自分の手番で自分に最も有利な選択をし（スコア最大）、相手の手番では相手が最も有利な選択をする（スコア最小）と仮定して、次の手を網羅的に探索する手法である。",c:["Mini-Max法","Mini-Mini法","Max-Max法","αβ法"],a:0,exp:"Mini-Max法は、自分の手番では最大スコアを、相手の手番では最小スコアを選ぶと仮定し次の手を探索する手法です(A)。αβ法は探索不要な枝を枝刈りすることでMini-Max法を効率化した手法です。",tip:"ゲームAIに用いられる探索手法について理解しておきましょう。"},
{id:10,ch:"第2章 人工知能をめぐる動向",q:"ボードゲームの盤面評価に利用されるモンテカルロ法に関する説明として、最も不適切なものを選べ。",c:["モンテカルロ法は、プレイアウトを繰り返して盤面を評価する手法である","モンテカルロ法は、盤面の評価をブルートフォースで行う手法である","モンテカルロ法は、盤面のスコアが明確に定義できない場合には適用することができない","モンテカルロ法は、仮想的なプレイヤーを通じて盤面のシミュレーションを行う"],a:2,exp:"モンテカルロ法はランダムなプレイアウトを繰り返して盤面を評価する手法です(A)。ブルートフォースではなくランダムサンプリングを使います(B)。スコアが明確でなくても適用できます(C)。仮想プレイヤーによるシミュレーションを行います(D)。",tip:"モンテカルロ法の特徴と使いどころを整理しておきましょう。"},
{id:11,ch:"第2章 人工知能をめぐる動向",q:"第二次AIブームに関する説明として、最も不適切なものを選べ。",c:["第二次AIブーム初期に影響力の大きかったエキスパートシステムとして、マイシンがあげられる","第二次AIブームでは、自然言語の知識ベースを用いて、対話型のAIであるイライザが開発された","第二次AIブームで開発されたDENDRALは、未知の有機化合物を特定するエキスパートシステムである","第二次AIブームで開発されたエキスパートシステムは、知識ベースと呼ばれるデータを取り込み、専門家のように振る舞うプログラムである"],a:1,exp:"イライザ（ELIZA）は1964年から1966年にかけて開発されたプログラムであり、第二次AIブームの技術ではなく第一次AIブームに関連します(B)。マイシン(A)・DENDRAL(C)は第二次AIブームのエキスパートシステムの代表例です。",tip:"各AIブームと代表的な研究・技術を対応させて覚えておきましょう。"},
{id:12,ch:"第2章 人工知能をめぐる動向",q:"意味ネットワークにおける継承関係の説明として、最も適切なものを選べ。",c:["意味ネットワークにおける継承関係は、「part-of」の関係で表される","意味ネットワークにおける継承関係は、「has-a」の関係で表される","意味ネットワークにおける継承関係は、「is-a」の関係で表される","意味ネットワークにおける継承関係は、「value-of」の関係で表される"],a:2,exp:"意味ネットワークにおける継承関係は「is-a」関係で表されます(C)。例えば「犬 is-a 動物」のように、上位概念の性質を下位概念が継承します。「part-of」は部分関係、「has-a」は所有関係を表します。",tip:"意味ネットワークの関係の種類（is-a、part-of、has-a）を区別して覚えておきましょう。"},
{id:13,ch:"第2章 人工知能をめぐる動向",q:"ウェブサイトの情報リソースに意味を付与することで、より高度な意味処理をコンピュータに行わせるための技術が研究されている。この技術の名称として、最も適切なものを選べ。",c:["セマンティックウェブ","ウェブマイニング","LOD（Linked Open Data）","Cycプロジェクト"],a:0,exp:"セマンティックウェブは、ウェブ上の情報に意味を付与してコンピュータが高度な意味処理を行えるようにする技術です(A)。LODはデータをオープンに連携させる取り組み、ウェブマイニングはウェブデータからの知識抽出、Cycは常識知識をデータベース化するプロジェクトです。",tip:"セマンティックウェブ・LOD・ウェブマイニングの違いを整理しておきましょう。"},
{id:14,ch:"第2章 人工知能をめぐる動向",q:"機械学習とルールベース手法の特徴に関する説明として、最も不適切なものを選べ。",c:["機械学習は、データの中のパターンを自動的に学習することで、予測や分類を行うための技術である","ルールベース手法は、人間がプログラムに明示的にルールを与えて行動を決定させる手法であり、学習データを必要としない","機械学習は、一般に学習データが多いほど精度が向上する","ルールベース手法を適用した場合の予測精度は、機械学習に比べて常に低い"],a:3,exp:"機械学習はデータからパターンを学習します(A)。ルールベース手法は明示的ルールで動作し学習不要です(B)。学習データが多いほど精度向上する傾向があります(C)。ただし、ルールが明確なタスクではルールベース手法が機械学習より高精度なこともあるため、常に低いとは言えません(D)。",tip:"機械学習とルールベース手法の特徴の違いを整理しておきましょう。"},
{id:15,ch:"第2章 人工知能をめぐる動向",q:"第三次AIブームにおいて、ディープラーニングの研究が急速に進展した理由として、空欄（ア）（イ）に入る語句として最も適切な組み合わせを選べ。（ア）は画像、音声、テキストなど多様な形式のデータを大量に含んでおり、ディープラーニング技術を活用して効果的に処理することができる。また（イ）において、トロント大学がディープラーニングを活用して圧勝した。",c:["（ア）ビッグデータ　（イ）ILSVRC","（ア）LOD　（イ）ILSVRC","（ア）ビッグデータ　（イ）Kaggle","（ア）LOD　（イ）Kaggle"],a:0,exp:"第三次AIブームの発展要因として、ビッグデータの利用可能化と、2012年のILSVRC（ImageNet Large Scale Visual Recognition Challenge）でトロント大学がディープラーニングで圧勝したことが大きく貢献しています(A)。",tip:"第三次AIブームの発展要因であるビッグデータとILSVRCの関係を押さえておきましょう。"},
// ===== 第3章 機械学習の概要 =====
{id:16,ch:"第3章 機械学習の概要",q:"教師あり学習に関する説明として、最も不適切なものを選べ。",c:["教師あり学習は、多数の特徴量と教師データのペアから学習を行う","教師あり学習では、推論時に特徴量のみを入力して予測を行う","教師あり学習は、特徴量のみを使用して学習することも可能である","教師あり学習では、一般に学習で使用するデータ量が多ければ多いほど精度が高くなる"],a:2,exp:"教師あり学習は特徴量と正解ラベル（教師データ）のペアで学習します(A)。推論時には特徴量のみ入力します(B)。データが多いほど精度が上がる傾向があります(D)。特徴量のみ（正解ラベルなし）で学習するのは教師なし学習であり、教師あり学習ではありません(C)。",tip:"教師あり・なし・強化学習の違いをそれぞれ整理しましょう。"},
{id:17,ch:"第3章 機械学習の概要",q:"分類タスクに関する以下の説明（ア）〜（エ）のうち、適切なものの組み合わせを選べ。（ア）分類タスクは、与えられた入力に対して連続的な数値を予測するタスクである（イ）多クラス分類においてニューラルネットワークを利用する場合、出力層の活性化関数としてソフトマックス関数が使用される（ウ）分類タスクは、事前に設定された複数のカテゴリに入力データを適切に振り分けるタスクである（エ）分類タスクに用いられる手法として、ロジスティック回帰があげられる",c:["（イ）（ウ）（エ）","（ア）（ウ）（エ）","（ア）（イ）（エ）","すべて適切"],a:0,exp:"（ア）は連続値予測なので回帰タスクの説明です（誤り）。（イ）多クラス分類でソフトマックス関数を使用（正しい）。（ウ）分類タスクの正しい説明（正しい）。（エ）ロジスティック回帰は分類タスク（正しい）。よって(イ)(ウ)(エ)が正解(A)。",tip:"分類と回帰の違い、各タスクの手法について整理しておきましょう。"},
{id:18,ch:"第3章 機械学習の概要",q:"線形回帰・ラッソ回帰・リッジ回帰について、空欄（ア）（イ）（ウ）に入る語句として最も適切な組み合わせを選べ。（ア）とは、説明変数と目的変数の線形的な数値関係をモデル化し、回帰係数を求める手法である。（ア）の損失関数にL1正則化項を加えた手法が（イ）であり、L2正則化項を加えた手法が（ウ）である。",c:["（ア）線形回帰（イ）リッジ回帰（ウ）ラッソ回帰","（ア）ロジスティック回帰（イ）リッジ回帰（ウ）ラッソ回帰","（ア）線形回帰（イ）ラッソ回帰（ウ）リッジ回帰","（ア）ロジスティック回帰（イ）ラッソ回帰（ウ）リッジ回帰"],a:2,exp:"線形回帰は説明変数と目的変数の線形関係をモデル化します(ア)。L1正則化を加えたものがラッソ回帰(イ)、L2正則化を加えたものがリッジ回帰(ウ)です(C)。ラッソ回帰は変数選択に有効で、リッジ回帰は回帰係数の大きさを小さくする効果があります。",tip:"線形回帰、ラッソ回帰、リッジ回帰のそれぞれの特徴を理解しておきましょう。"},
{id:19,ch:"第3章 機械学習の概要",q:"データ全体から一部を抽出して複数の弱学習器を並列に学習させ、出力を多数決や平均で決定するアンサンブル学習の方法として、最も適切なものを選べ。",c:["バギング","ブートストラップサンプリング","ブースティング","パディング"],a:0,exp:"バギングはデータからブートストラップサンプリングによって複数の弱学習器を並列学習させ、多数決や平均で出力を決定する手法です(A)。ランダムフォレストの代表的な手法です。ブースティングは弱学習器を逐次的に学習させる手法です(C)。",tip:"アンサンブル学習の代表的な手法（バギング・ブースティング）の違いを整理しましょう。"},
{id:20,ch:"第3章 機械学習の概要",q:"「サポートベクターマシン（SVM）」に関する以下の記述を読み、空欄（ア）（イ）に入る語句として最も適切な組み合わせを選べ。SVMはこのマージンが（ア）となるような境界線を求めることで2クラス分類を解く。この境界線は直線だが、SVMでは直線で分類できない問題についても（イ）関数と（イ）トリックを利用して解くことが可能である。",c:["（ア）最大（イ）マージン","（ア）最大（イ）カーネル","（ア）最小（イ）マージン","（ア）最小（イ）カーネル"],a:1,exp:"SVMはマージン（分類境界と最近傍データ点との距離）が最大になるような境界線を求めます(ア：最大)。直線で分類できない問題にはカーネル関数とカーネルトリックを用いて高次元に写像することで対応します(イ：カーネル)(B)。",tip:"SVMの仕組みについて理解しておきましょう。"},
{id:21,ch:"第3章 機械学習の概要",q:"協調フィルタリングに関する説明として、最も適切なものを選べ。",c:["協調フィルタリングは、ユーザーAと好みが似ているユーザーBを抽出し、ユーザーBが購入した商品をユーザーAに推薦する手法である","協調フィルタリングは、よく検索される商品を優先的に推薦する手法である","協調フィルタリングは、ユーザーが検索した商品に関連する商品を推薦する手法である","協調フィルタリングは、商品情報をもとに新商品を推薦する手法である"],a:0,exp:"協調フィルタリングは、複数ユーザーの過去の購買情報や評価情報を利用して、ユーザーの嗜好や関心にもとづく予測と推薦を行う手法です(A)。よく検索される商品の推薦(B)や商品情報ベースの推薦(C)(D)はコンテンツベースフィルタリングに該当します。",tip:"レコメンデーションの代表的な手法とその特徴を理解しておきましょう。"},
{id:22,ch:"第3章 機械学習の概要",q:"強化学習のフレームワークに関する理解を問う問題です。強化学習において、空欄（ア）（イ）（ウ）に入る語句として最も適切な組み合わせを選べ。強化学習は機械学習の一分野であり、エージェントが環境と相互作用しながら、試行錯誤を通じて最適な（ア）を学習します。エージェントは（イ）を選択し、（ウ）を割引率で乗じます。",c:["（ア）状態　（イ）報酬　（ウ）割引率","（ア）行動　（イ）報酬　（ウ）割引率","（ア）状態　（イ）結果　（ウ）期待値","（ア）行動　（イ）結果　（ウ）期待値"],a:1,exp:"強化学習ではエージェントが環境と相互作用しながら最適な行動(ア)を学習します。エージェントは報酬(イ)の累積が最大になるよう学習します。将来の報酬は割引率(ウ)を乗じて計算します(B)。",tip:"強化学習のフレームワークについて整理しておきましょう。"},
{id:23,ch:"第3章 機械学習の概要",q:"教師あり学習におけるデータの分割方法に関する以下の記述を読み、空欄（ア）〜（ウ）に入る語句として最も適切な組み合わせを選べ。（ア）はモデルの学習に用いられるデータである。（ア）のみを使用して学習を行ったのち、（イ）のみを使用してモデルの性能を評価する。なお、モデルのハイパーパラメータなどを調整する目的で、さらに（ア）を分割することがある。このデータは（ウ）と呼ばれる。",c:["（ア）訓練データ（イ）テストデータ（ウ）検証データ","（ア）検証データ（イ）訓練データ（ウ）テストデータ","（ア）訓練データ（イ）検証データ（ウ）テストデータ","（ア）検証データ（イ）テストデータ（ウ）訓練データ"],a:0,exp:"訓練データ(ア)でモデルを学習し、テストデータ(イ)で性能評価します。ハイパーパラメータ調整目的で訓練データを分割した部分を検証データ(ウ)と呼びます(A)。",tip:"訓練データ、検証データ、テストデータのそれぞれの役割を理解しておきましょう。"},
{id:24,ch:"第3章 機械学習の概要",q:"機械学習においてモデルの性能評価を行う手法のひとつとして、ホールドアウト検証があげられる。ホールドアウト検証に関する説明として、最も適切なものを選べ。",c:["ホールドアウト検証は、データをk個のブロックに分割してそのうちの1つをテストデータとし、残りのブロックを訓練データとして学習・評価を繰り返す手法である","ホールドアウト検証は、データを訓練用とテスト用に分割し、訓練データでモデルを学習し、テストデータでモデルの性能を評価する方法である","ホールドアウト検証は、ある観測時点を境にデータを訓練用とテスト用に分割し、これを複数の時点で行うことで評価を繰り返す方法である","ホールドアウト検証は、データ全体を学習に使用し、同じデータでモデルの性能を評価する方法である"],a:1,exp:"ホールドアウト検証はデータを訓練用とテスト用に分割し、訓練データで学習してテストデータで評価する方法です(B)。k個のブロック分割を繰り返す手法はk分割交差検証(A)です。",tip:"汎化性能を正しく評価することは非常に重要です。データ分割手法についてしっかり理解しておきましょう。"},
{id:25,ch:"第3章 機械学習の概要",q:"機械学習モデルの性能評価において、空欄（ア）（イ）に入る語句として最も適切な組み合わせを選べ。機械学習モデルの性能評価において、（ア）は訓練データに対するモデルの予測誤差であり、（イ）は未知のデータに対するモデルの予測誤差の期待値である。",c:["（ア）期待誤差（イ）汎化誤差","（ア）訓練誤差（イ）汎化誤差","（ア）汎化誤差（イ）期待誤差","（ア）訓練誤差（イ）期待誤差"],a:1,exp:"訓練データに対するモデルの予測誤差を訓練誤差(ア)と呼びます。未知データに対する予測誤差の期待値を汎化誤差(イ)と呼びます(B)。汎化誤差が小さいほど汎化性能が高いといえます。",tip:"訓練誤差と汎化誤差の概念を理解しておきましょう。バイアスとバリアンスのトレードオフも関連して理解すると効果的です。"},
{id:26,ch:"第3章 機械学習の概要",q:"分類タスクにおいてモデルの性能を評価するために使用される指標として、混同行列があります。2クラス分類では予測ラベルと正解ラベルの対応に応じてデータを4つに分類できます。空欄（ア）〜（ウ）に入る語句として最も適切な組み合わせを選べ。（ア）はそれらを表にしたものである。（イ）は、実際には陽性であるにもかかわらず、モデルが陰性と予測したデータのことである。（ウ）は、実際には陰性であるにもかかわらず、モデルが陽性と予測したデータのことである。",c:["（ア）混同行列（イ）真陽性（ウ）偽陰性","（ア）AUC（イ）偽陰性（ウ）偽陽性","（ア）AUC（イ）真陽性（ウ）真陰性","（ア）混同行列（イ）偽陰性（ウ）偽陽性"],a:3,exp:"2クラス分類の評価表を混同行列(ア)と呼びます。実際は陽性だがモデルが陰性と予測したデータを偽陰性(イ)、実際は陰性だが陽性と予測したデータを偽陽性(ウ)と呼びます(D)。",tip:"混同行列の要素の名称は非常に覚えにくいですが、分類タスクにおける各評価指標を理解するうえで非常に重要です。"},
{id:27,ch:"第3章 機械学習の概要",q:"回帰タスクにおいて用いられる評価指標として、最も不適切なものを選べ。",c:["MSE（Mean Squared Error）","AUC（Area Under the Curve）","MAE（Mean Absolute Error）","RMSE（Root Mean Squared Error）"],a:1,exp:"MSE(A)・MAE(C)・RMSE(D)は回帰タスクの代表的評価指標です。AUC(B)はROC曲線の下部面積で分類タスクの評価指標です。",tip:"回帰タスクで使用される代表的な評価指標の計算方法と特徴について覚えておきましょう。"},
{id:28,ch:"第3章 機械学習の概要",q:"機械学習では、過学習と呼ばれる問題が発生することがある。過学習の状態に関する説明として、最も適切なものを選べ。",c:["正則化項の影響が大きいために、未知のデータに対する性能が低い状態","正則化項の影響が小さいために、未知のデータに対する性能が高い状態","モデルの学習が不十分であるために、未知のデータに対する性能が低い状態","モデルが訓練データに過度に適合しているために、未知のデータに対する性能が低い状態"],a:3,exp:"過学習とは、モデルが訓練データに過度に適合した結果、未知データに対する汎化性能が低下した状態です(D)。正則化項の影響が大きすぎると未学習が発生します(A)。",tip:"過学習の状態や原因について整理しておきましょう。"},
{id:29,ch:"第3章 機械学習の概要",q:"「ある事柄を説明するためには、必要以上に多くを仮定するべきでない」というモデル構築の指針を示す用語として、最も適切なものを選べ。",c:["次元の呪い","ノーフリーランチ定理","オッカムの剃刀","カーネルトリック"],a:2,exp:"オッカムの剃刀とは「ある事柄を説明するためには必要以上に多くを仮定するべきでない」というモデル構築の指針です(C)。単純なモデルを選択することが合理的とされます。次元の呪い(A)・ノーフリーランチ定理(B)・カーネルトリック(D)は別の概念です。",tip:"機械学習モデルを選ぶ際には精度だけでなく複雑さも考慮すべきであることを覚えておきましょう。"},
{id:30,ch:"第3章 機械学習の概要",q:"モデル選定を行う際には、モデルの複雑さと予測性能のバランスを取ることが重要である。このようなことを考慮できる評価指標として、最も適切なものを選べ。",c:["F値","赤池情報量基準（AIC）","適合率","平均二乗誤差"],a:1,exp:"赤池情報量基準（AIC）は、モデルの精度と複雑さのトレードオフを考慮できる評価指標です(B)。AICは値が小さいほど良いモデルとされ、モデルの精度が高いほど小さく、パラメータが増えるほど大きくなります。F値(A)・適合率(C)は分類、MSE(D)は回帰専用です。",tip:"AICなどのモデル選択基準について理解しておきましょう。"},
// ===== 第4章 ディープラーニングの概要 =====
{id:31,ch:"第4章 ディープラーニングの概要",q:"ニューラルネットワークに関する記述として、最も不適切なものを選べ。",c:["ニューラルネットワークは、脳の神経回路網に着想を得て考案された機械学習モデルである","ニューラルネットワークは、複数のニューロンの集合から構成される層をもつ","ニューラルネットワークの層の数を非常に大きくしたネットワークは、ディープニューラルネットワークと呼ばれる","ニューラルネットワークは、分類タスクのみを解くことができる機械学習モデルである"],a:3,exp:"ニューラルネットワークは人間の脳の神経回路網を模した機械学習モデルです(A・B)。層を深くしたものをディープニューラルネットワークと呼びます(C)。分類だけでなく回帰など多様なタスクを解くことができます(D)。",tip:"ニューラルネットワークの概要と構造について理解しておきましょう。"},
{id:32,ch:"第4章 ディープラーニングの概要",q:"ディープラーニングでは、学習によって最適な特徴量の抽出方法が獲得される。このことを表す用語として、最も適切なものを選べ。",c:["能動学習","特徴表現学習","教師なし学習","強化学習"],a:1,exp:"ディープラーニングでは学習によって特徴量の抽出方法自体が最適化されます。これを特徴表現学習と呼びます(B)。従来の機械学習では人間が手動で特徴量を設計する必要がありましたが、ディープラーニングではこれが自動化されます。",tip:"特徴表現学習はディープラーニングの重要な特徴です。その内容を理解しておきましょう。"},
{id:33,ch:"第4章 ディープラーニングの概要",q:"ディープラーニングに関する記述として、最も不適切なものを選べ。",c:["ディープラーニングは、ニューラルネットワークの層の数を非常に大きくしたディープニューラルネットワークを用いる機械学習手法である","ディープラーニングでは、ネットワークの複雑さに対して学習データが少ない場合、過学習が発生しやすい","ディープラーニングは、画像認識や自然言語処理など多くの分野で技術的なブレークスルーをもたらしている","ディープラーニングは、予測の根拠を説明できるためホワイトボックスモデルと呼ばれている"],a:3,exp:"ディープラーニングは深いNNを使う手法(A)、データ不足で過学習しやすい(B)、多分野でブレークスルー(C)は正しい。アルゴリズムが非常に複雑で判断理由の説明が難しいため、ブラックボックスモデルと呼ばれます(D)。",tip:"ディープラーニングとニューラルネットワークの関係について整理しておきましょう。"},
{id:34,ch:"第4章 ディープラーニングの概要",q:"コンピュータの演算処理装置のひとつとしてGPU（Graphics Processing Unit）がある。GPUに関する説明として、最も適切なものを選べ。",c:["GPUは、コンピュータ全般の作業を処理する役割を担う","GPUは、大規模な並列演算処理に特化している","GPUは、画像を扱うのが得意な一方、動画を扱うのは得意ではない","GPUは、処理方法の異なる多様なタスクを同時に処理することが得意である"],a:1,exp:"GPUは大規模な並列演算処理に特化した演算処理装置です(B)。コンピュータ全般の作業処理はCPUの役割(A)。GPUは大量の並列計算が得意なためディープラーニングの学習に広く使われています。",tip:"GPUとCPUの違いや役割について理解しておきましょう。"},
{id:35,ch:"第4章 ディープラーニングの概要",q:"ニューラルネットワークにおける活性化関数に関する説明として、最も適切なものを選べ。",c:["シグモイド関数は、ReLU（Rectified Linear Unit）と比較して勾配消失問題が発生しやすい","ReLU（Rectified Linear Unit）は、入力が0以上の領域では必ず0を出力する関数である","Leaky ReLU（Leaky Rectified Linear Unit）は、入力が0以上の領域で非線形な関数である","tanh関数は、ReLU（Rectified Linear Unit）と比較して勾配消失問題が発生しにくい"],a:0,exp:"シグモイド関数は入力が大きくなると勾配が消失しやすい問題があります(A)。ReLUは入力が0以上の時は入力値をそのまま出力します(B)。Leaky ReLUは0以上の領域では線形です(C)。tanh関数もシグモイドと同様に勾配消失が発生しやすいです(D)。",tip:"主要な活性化関数（ReLU、Sigmoid、tanh、Softmax）の特徴と使われる場面を整理しましょう。"},
{id:36,ch:"第4章 ディープラーニングの概要",q:"分類タスクを解くためのニューラルネットワークの出力層に適用する活性化関数として、最も適切なものを選べ。",c:["恒等写像関数","ReLU（Rectified Linear Unit）","ソフトマックス関数","Leaky ReLU（Leaky Rectified Linear Unit）"],a:2,exp:"多クラス分類タスクでは出力層にソフトマックス関数を使います(C)。ソフトマックス関数は各クラスの確率分布を出力します。ReLUやLeaky ReLUは通常、隠れ層で使用されます(B・D)。恒等写像関数は回帰タスクで使います(A)。",tip:"出力層で使用される活性化関数について整理しておきましょう。"},
{id:37,ch:"第4章 ディープラーニングの概要",q:"機械学習モデルの予測値と教師データとの誤差を計算するための関数として、最も適切なものを選べ。",c:["損失関数","差分関数","残差関数","分散関数"],a:0,exp:"損失関数（誤差関数）は機械学習モデルの予測値と教師データの誤差を計算する関数です(A)。機械学習では訓練データを使用して損失関数を最小化するようにパラメータを更新します。差分・残差・分散関数という名称は一般的ではありません。",tip:"損失関数の概要と役割を覚えておきましょう。"},
{id:38,ch:"第4章 ディープラーニングの概要",q:"機械学習における正則化の主要な目的として、最も適切なものを選べ。",c:["正則化の目的は、データの外れ値の影響を小さくすることである","正則化の目的は、モデルの学習速度を上げることである","正則化の目的は、モデルに入力する特徴量を作り出すことである","正則化の目的は、過学習を防ぎ汎化性能を向上させることである"],a:3,exp:"正則化とは、モデルのパラメータの取り得る値を制限することで、過学習を防ぎ汎化性能を向上させる技術です(D)。損失関数に正則化項を加えることでパラメータの大きさにペナルティを与えます。",tip:"正則化の目的と仕組みについて理解しておきましょう。"},
{id:39,ch:"第4章 ディープラーニングの概要",q:"ニューラルネットワークの学習に用いられるドロップアウトに関する説明として、最も不適切なものを選べ。",c:["ドロップアウトは、学習時に訓練データをランダムに除外する手法である","ドロップアウトは、学習時にニューロンをランダムに除外する手法である","ドロップアウトは、過学習を抑制するテクニックである","ドロップアウトによる学習は、アンサンブル学習とみなすことができる"],a:0,exp:"ドロップアウトは学習時にニューロンをランダムに除外する手法です(B)。訓練データを除外するのではありません(A)。過学習抑制(C)・アンサンブル学習的解釈(D)は正しい説明です。",tip:"ドロップアウトの仕組みと目的について理解しておきましょう。"},
{id:40,ch:"第4章 ディープラーニングの概要",q:"ニューラルネットワークの学習において、二重降下現象と呼ばれる現象が発生することがある。二重降下現象に関する説明として、最も適切なものを選べ。",c:["二重降下現象とは、学習中に訓練データにおける誤差が減少し、テストデータにおける誤差が増加する現象である","二重降下現象とは、学習中に訓練データとテストデータにおける誤差が共に減少する現象である","二重降下現象とは、ニューラルネットワークの層が増えることで過学習が進む現象である","二重降下現象とは、学習中に減少していたテストデータに対する誤差が一度増加したあと、再び減少する現象である"],a:3,exp:"二重降下現象とは、学習中に減少していたテストデータの誤差が一度増加したあと再び減少する現象です(D)。これはモデルのパラメータ数が増えるにつれて誤差が二重降下する形を示します。",tip:"ニューラルネットワークの学習における課題について整理しておきましょう。"},
{id:41,ch:"第4章 ディープラーニングの概要",q:"ニューラルネットワークの学習時に発生する問題に関する以下の文章を読み、空欄（ア）（イ）に入る語句として最も適切な組み合わせを選べ。（ア）は、出力層における勾配が入力層まで伝わらず、入力層付近のパラメータの更新が滞ってしまう現象である。逆に（イ）は、学習の途中で勾配が大きくなり過ぎることで、パラメータの更新が非常に大きくなり安定的に学習を進められなくなる現象である。",c:["（ア）勾配消失問題（イ）勾配爆発問題","（ア）勾配消失問題（イ）信用割当問題","（ア）勾配損失問題（イ）勾配爆発問題","（ア）勾配損失問題（イ）信用割当問題"],a:0,exp:"出力層の勾配が入力層まで伝わらない現象を勾配消失問題(ア)、勾配が大きくなりすぎる現象を勾配爆発問題(イ)と呼びます(A)。誤差逆伝播法で勾配消失問題に対処するため、ReLUなどの活性化関数が使われます。",tip:"ニューラルネットワークの学習における課題について整理しておきましょう。"},
{id:42,ch:"第4章 ディープラーニングの概要",q:"ハイパーパラメータを探索する手法のひとつにグリッドサーチがある。グリッドサーチに関する説明として、最も適切なものを選べ。",c:["グリッドサーチは、ハイパーパラメータの候補からランダムに選択しながら探索する手法である","グリッドサーチは、ハイパーパラメータの候補のすべての組み合わせを探索する手法である","グリッドサーチは、探索の過程において、その時点までの探索結果を踏まえて次の探索点を決定する手法である","グリッドサーチは、突然変異や世代交代といった概念を用いて探索を行う手法である"],a:1,exp:"グリッドサーチはハイパーパラメータの候補のすべての組み合わせを探索する手法です(B)。ランダムに選択(A)はランダムサーチ、過去結果を踏まえる(C)はベイズ最適化、突然変異・世代交代(D)は進化的アルゴリズムの説明です。",tip:"グリッドサーチとランダムサーチ、ベイズ最適化の違いについて理解しておきましょう。"},
// ===== 第5章 ディープラーニングの要素技術 =====
{id:43,ch:"第5章 ディープラーニングの要素技術",q:"畳み込みニューラルネットワーク（CNN）は、画像などから多次元の特徴マップを抽出し、その特徴マップを1次元に変換したのち、後続の層で出力ノード数の次元を持つベクトルへの変換を行う。このように、ある長さの1次元配列を出力ノード数の次元を持つベクトルに変換する処理を行う層の名称として、最も適切なものを選べ。",c:["畳み込み層","プーリング層","全結合層","疎結合層"],a:2,exp:"全結合層は1次元配列を出力ノード数の次元を持つベクトルに変換する処理を行います(C)。CNNでは畳み込み層・プーリング層で特徴抽出し、全結合層で分類などの最終処理を行います。",tip:"CNNの構成要素（畳み込み層・プーリング層・全結合層・活性化関数）それぞれの役割を整理しましょう。"},
{id:44,ch:"第5章 ディープラーニングの要素技術",q:"畳み込みニューラルネットワーク（CNN）において、畳み込み層やプーリング層の出力を特徴マップと呼ぶ。この特徴マップの各チャンネルに対し、全体の平均値を1の値にするプーリング手法がある。この手法の名称として、最も適切なものを選べ。",c:["グローバルアベレージプーリング","ローカルアベレージプーリング","トータルアベレージプーリング","ディープアベレージプーリング"],a:0,exp:"グローバルアベレージプーリングは特徴マップの各チャンネルに対し全体の平均値を1の値にするプーリング手法です(A)。GoogLeNetなどで使用され、全結合層の代替として利用されることがあります。",tip:"CNNで使用されるプーリング手法の種類と特徴を整理しておきましょう。"},
{id:45,ch:"第5章 ディープラーニングの要素技術",q:"ニューラルネットワークで使用されるバッチ正規化に関する説明として、最も適切なものを選べ。",c:["バッチ正規化は、学習前に訓練データ全体を正規化する手法である","バッチ正規化は、前層の出力を正規化する手法である","バッチ正規化は、ネットワークのパラメータの初期値を適切に決定する手法である","バッチ正規化は、ネットワークの最終層の出力を正規化する手法である"],a:1,exp:"バッチ正規化は各ミニバッチ内でニューラルネットワークの各層への入力（前層の出力）を正規化する手法です(B)。これにより学習が安定し収束が早まります。また学習率を大きく設定できるようになります。",tip:"バッチ正規化の仕組みと効果について理解しておきましょう。"},
{id:46,ch:"第5章 ディープラーニングの要素技術",q:"ディープニューラルネットワークにおいて、層を追加すると、勾配消失問題とパラメータ数増加に伴う計算時間の増加が生じる。ResNet（Residual Network）ではこの2つの問題をそれぞれ解決し、152層などの深いネットワーク構造の学習を可能にした。（ア）結合と（イ）構造の組み合わせで最も適切なものを選べ。",c:["（ア）ワープ（イ）ワイド","（ア）ワープ（イ）ボトルネック","（ア）スキップ（イ）ワイド","（ア）スキップ（イ）ボトルネック"],a:3,exp:"ResNetはスキップ結合（残差結合）により勾配消失問題を解決し、ボトルネック構造により計算量を削減しています(D)。スキップ結合は層を飛び越えた結合で誤差を入力層側まで伝播しやすくします。",tip:"ResNetのスキップ結合とボトルネック構造について理解しておきましょう。"},
{id:47,ch:"第5章 ディープラーニングの要素技術",q:"リカレントニューラルネットワーク（RNN）の構造を持つネットワークとして適切なものの組み合わせを選べ。（ア）Transformer（イ）ジョルダンネットワーク（ウ）エルマンネットワーク（エ）LSTM（Long Short-Term Memory）",c:["（ア）（イ）（ウ）","（イ）（ウ）（エ）","（ア）（ウ）（エ）","すべて適切"],a:1,exp:"RNNの構造を持つのはジョルダンネットワーク(イ)・エルマンネットワーク(ウ)・LSTM(エ)です(B)。TransformerはAttention機構を用いたアーキテクチャでRNN構造ではありません(ア)。",tip:"リカレントニューラルネットワークの構造と種類を整理しておきましょう。"},
{id:48,ch:"第5章 ディープラーニングの要素技術",q:"LSTM（Long Short-Term Memory）は、LSTMブロックと呼ばれる構造を採用することで、系列データの学習を効率的に行えるようにしたリカレントニューラルネットワーク（RNN）である。LSTMブロックは（ア）と（イ）によって構成される。また、LSTMの（イ）を簡略化したネットワークとして（ウ）がある。",c:["（ア）GRU（イ）ゲート機構（ウ）CEC","（ア）CEC（イ）ゲート機構（ウ）GRU","（ア）GRU（イ）ボトルネック構造（ウ）CEC","（ア）CEC（イ）ボトルネック構造（ウ）GRU"],a:1,exp:"LSTMブロックはCEC（Constant Error Carousel）(ア)とゲート機構(イ)で構成されます。LSTMのゲート機構を簡略化したものがGRU（Gated Recurrent Unit）(ウ)です(B)。",tip:"LSTMの構造と特徴を理解しておきましょう。"},
{id:49,ch:"第5章 ディープラーニングの要素技術",q:"自然言語処理に利用されるニューラルネットワークであるTransformerは、Attentionと呼ばれる機構を採用している。このAttentionに関する以下の説明を読み、空欄（ア）（イ）に入る語句として最も適切な組み合わせを選べ。（ア）は、文章内の単語間の関連性を捉えることを目的とした機構である。Transformerのエンコーダおよびデコーダでは、（ア）が並列に複数設置されている。この機構は（イ）と呼ばれる。",c:["（ア）Self-Attention（イ）Source-Target Attention","（ア）Self-Attention（イ）Multi-Head Attention","（ア）Encoder-Decoder Attention（イ）Source-Target Attention","（ア）Encoder-Decoder Attention（イ）Multi-Head Attention"],a:1,exp:"文章内の単語間の関連性を捉える機構をSelf-Attention(ア)と呼びます。TransformerではこのSelf-Attentionが並列に複数設置されており、この仕組みをMulti-Head Attention(イ)と呼びます(B)。",tip:"Q（クエリ）、K（キー）、V（バリュー）の計算手順を整理しましょう。"},
{id:50,ch:"第5章 ディープラーニングの要素技術",q:"変分オートエンコーダ（VAE：Variational AutoEncoder）に関する説明として、最も不適切なものを選べ。",c:["VAEは、エンコーダとデコーダの2つのネットワークで構成される","VAEでは、学習後にデータを生成する際はエンコーダのみを使用する","VAEでは、学習が完了すると、入力データが確率分布上で表現されるようになる","VAEは、生成ネットワークの一種であり、画像生成などのタスクに利用される"],a:1,exp:"VAEはエンコーダとデコーダで構成されます(A)。学習後のデータ生成にはデコーダのみを使用し（エンコーダは不要）、エンコーダのみという記述は不適切です(B)。入力データが確率分布で表現されること(C)・画像生成への利用(D)は正しいです。",tip:"VAEの仕組みと特徴について理解しておきましょう。"},
{id:51,ch:"第5章 ディープラーニングの要素技術",q:"機械学習では、汎化性能の向上を目的として、訓練データを加工してデータ量を増やすことがある。これをデータ拡張と呼ぶ。テキストデータに適用されるデータ拡張手法に関する説明として、最も不適切なものを選べ。",c:["Paraphrasingは、単語を別の類似した単語で置き換える手法である","Noisingは、単語の入れ替え、削除、挿入、置換などをランダムに行う手法である","Samplingは、テキストデータの分布を推定し、新しいデータのサンプリングを行う手法である","Rotationは、ある文章の一部を別の文章に結合する手法である"],a:3,exp:"Rotation（回転）は画像データ拡張の手法であり、テキストデータには適用されません(D)。Paraphrasing(A)・Noising(B)・Sampling(C)はテキストデータに適用されるデータ拡張手法です。",tip:"データ拡張の目的と代表的な手法を理解しておきましょう。"},
// ===== 第6章 ディープラーニングの応用例 =====
{id:52,ch:"第6章 ディープラーニングの応用例",q:"画像内に存在する物体の位置を特定し、その物体を識別するタスクとして最も適切なものを選べ。",c:["物体識別","物体検出","一般物体認識","特定物体認識"],a:1,exp:"物体検出は画像内の物体の位置をバウンディングボックス（矩形）で特定し、そのクラスを識別するタスクです(B)。物体識別は物体のクラスを識別するタスク(A)、一般物体認識は画像に写っているものが何かを識別するタスクです。",tip:"画像処理におけるタスクの種類について整理しておきましょう。"},
{id:53,ch:"第6章 ディープラーニングの応用例",q:"2016年に発表されたYOLO（You Only Look Once）に関する説明として、最も適切なものを選べ。",c:["YOLOは、画像中の物体位置の候補領域を検出する際にSelective Searchを使用する","YOLOの構造を改良したネットワークとして、U-Netがある","YOLOは、画像中の物体位置の特定とクラス識別を同時に行うことができる","YOLOは、サイズの異なる特徴マップを出力層に接続することで、さまざまな大きさの物体を検出できる"],a:2,exp:"YOLOは画像全体を1回のフォワードパスで処理し、物体の位置特定とクラス識別を同時に行うことができます(C)。R-CNNはSelective Searchを使用します(A)。U-NetはYOLOの改良ではなくセグメンテーション用ネットワークです(B)。",tip:"物体検出の代表的な手法（R-CNN系、YOLO系）の違いを整理しておきましょう。"},
{id:54,ch:"第6章 ディープラーニングの応用例",q:"文章をベクトルで表現する手法に関する以下の文章を読み、空欄（ア）に入る語句として最も適切なものを選べ。（ア）は、文書内の各単語の出現回数にもとづいてその文書をベクトル化する手法である。",c:["n-gram","One-Hot Encoding","word2vec","Bag-of-Words"],a:3,exp:"Bag-of-Wordsは文書内の各単語の出現回数にもとづいて文書をベクトル化する手法です(D)。n-gramは隣接するn個の単語のまとまりを考慮する手法、word2vecは単語の分散表現を得るニューラルネットワーク、One-Hot Encodingは単語を0/1ベクトルで表す手法です。",tip:"テキストデータを処理するさまざまな手法について整理しておきましょう。"},
{id:55,ch:"第6章 ディープラーニングの応用例",q:"BERT（Bidirectional Encoder Representations from Transformers）は、自然言語処理のためのネットワークであり、（ア）と（イ）という自己教師あり学習のタスクによって事前学習を行う。（ア）は文章中の一部の単語を隠し、その単語が何かを予測するタスクである。（イ）は、2つの入力文が連続する文かどうかを判別するタスクである。",c:["（ア）MLM（Masked Language Model）（イ）NSP（Next Sentence Prediction）","（ア）MLP（MultiLayer Perceptron）（イ）NSP（Next Sentence Prediction）","（ア）MLM（Masked Language Model）（イ）NLP（Natural Language Processing）","（ア）MLP（MultiLayer Perceptron）（イ）NLP（Natural Language Processing）"],a:0,exp:"BERTの事前学習タスクはMLM（マスク言語モデル）(ア)とNSP（次文予測）(イ)の2つです(A)。MLMで単語の双方向的な文脈理解を、NSPで文間の関係理解を獲得します。",tip:"BERTとGPTの事前学習方法の違いを整理しておきましょう。BERTは双方向、GPTは単方向（自己回帰）です。"},
{id:56,ch:"第6章 ディープラーニングの応用例",q:"グーグルが2022年に発表した大規模言語モデルとして、最も適切なものを選べ。",c:["PaLM（Pathways Language Model）","GRU（Gated Recurrent Unit）","ELMo（Embeddings from Language Models）","GPT-3（Generative Pre-Training 3）"],a:0,exp:"PaLM（Pathways Language Model）は2022年にグーグルが発表した大規模言語モデルです(A)。GRUはRNNの一種(B)、ELMoは単語の文脈依存表現を得るモデル(C)、GPT-3はOpenAIが開発した大規模言語モデルです(D)。",tip:"代表的な大規模言語モデルとその開発元を覚えておきましょう。"},
{id:57,ch:"第6章 ディープラーニングの応用例",q:"オープンAI社によって2018年に発表されたOpenAI Fiveに関する説明として、最も不適切なものを選べ。",c:["OpenAI Fiveは、系列情報を処理するためにLSTM（Long Short-Term Memory）を使用したゲームAIである","OpenAI Fiveは、PPO（Proximal Policy Optimization）と呼ばれる強化学習アルゴリズムを使用したゲームAIである","OpenAI Fiveは、Atari2600ベンチマークで人間を超える性能を達成したゲームAIである","OpenAI Fiveは、マルチエージェント強化学習の手法を用いたゲームAIである"],a:2,exp:"OpenAI FiveはDota2という多人数対戦型ゲームAIで、LSTMを使用(A)・PPOを採用(B)・マルチエージェント強化学習(D)は正しいです。Atari2600ベンチマークを達成したのはDQNやAgent57などです(C)。",tip:"深層強化学習における代表的なゲームAIができることを整理しておきましょう。"},
{id:58,ch:"第6章 ディープラーニングの応用例",q:"オープンAI社が開発した文章生成AIであるChatGPTは、（ア）と呼ばれる強化学習を用いた手法によって訓練されている。（ア）は、人間がどのような回答を好むかをネットワークにフィードバックすることで、望ましい回答を生成できるようにする手法である。",c:["RLHF","DQN","報酬成形","残差強化学習"],a:0,exp:"ChatGPTはRLHF（Reinforcement Learning from Human Feedback：人間のフィードバックからの強化学習）(ア)で訓練されています(A)。人間の評価をフィードバックすることで有害な出力を減らし有用な回答を生成します。",tip:"大規模言語モデルの訓練手法としてRLHFを覚えておきましょう。"},
{id:59,ch:"第6章 ディープラーニングの応用例",q:"事前学習済みモデルを異なるタスクに転用することを（ア）という。（ア）では、異なるタスクにおける新たなデータを用いて、事前学習済みモデルのパラメータの一部または全部を更新することがある。これを（イ）と呼ぶ。（ア）（イ）に入る語句として最も適切な組み合わせを選べ。",c:["（ア）転用学習（イ）特徴表現学習","（ア）転用学習（イ）ファインチューニング","（ア）転移学習（イ）特徴表現学習","（ア）転移学習（イ）ファインチューニング"],a:3,exp:"事前学習済みモデルを異なるタスクに転用することを転移学習(ア)と呼びます。その際にパラメータを更新することをファインチューニング(イ)と呼びます(D)。",tip:"転移学習・ファインチューニング・ドメイン適応の違いを整理しておきましょう。"},
{id:60,ch:"第6章 ディープラーニングの応用例",q:"近年では、大量のデータを学習した1つのモデルを使用して、ファインチューニングなどによってさまざまなタスクを解くアプローチが盛んに研究されている。このような事前学習モデルを指す用語として、最も適切なものを選べ。",c:["汎化モデル","基底モデル","基盤モデル","完全モデル"],a:2,exp:"大量データで事前学習しファインチューニングでさまざまなタスクに対応できる事前学習モデルを基盤モデル（Foundation Model）と呼びます(C)。GPT系やBERTなどの大規模言語モデルや画像生成モデルが代表例です。",tip:"近年のディープラーニング研究において重要な概念である基盤モデルについて理解しておきましょう。"},
{id:61,ch:"第6章 ディープラーニングの応用例",q:"AIの予測根拠を人間が理解できる形で示すことを目指す技術や研究分野を（ア）という。（ア）の代表的な手法として、畳み込みニューラルネットワーク（CNN）に適用できる（イ）やGrad-（イ）がある。これらの手法では、特徴マップの値を利用することで、モデルがどの部分に注目したかを可視化することができる。",c:["（ア）説明可能AI（XAI）（イ）CAM（Class Activation Map）","（ア）説明可能AI（XAI）（イ）LIME（Local Interpretable Model-agnostic Explanations）","（ア）推論可能AI（IAI）（イ）CAM（Class Activation Map）","（ア）推論可能AI（IAI）（イ）LIME（Local Interpretable Model-agnostic Explanations）"],a:0,exp:"AIの予測根拠を人間が理解できる形で示す分野を説明可能AI（XAI：eXplainable Artificial Intelligence）(ア)と呼びます。CNNに適用できる代表的手法はCAM（Class Activation Map）(イ)やGrad-CAMです(A)。",tip:"特徴量の重要度や予測値への寄与を分析するXAIの代表的な手法について整理しておきましょう。"},
// ===== 第7章 AIの社会実装に向けて =====
{id:62,ch:"第7章 AIの社会実装に向けて",q:"AIを活用したプロジェクトを推進する際には、マネージャー、エンジニア、データサイエンティスト、デザイナーといった人材が必要となる。それぞれの役職に関する説明として、最も不適切なものを選べ。",c:["マネージャーは、ビジネス的な観点を踏まえたプロジェクト管理や意思決定を担う","エンジニアは、学習済みモデルを組み込んだシステムの開発を担う","デザイナーは、ステークホルダーのニーズを把握し、それにもとづいたプロジェクトの立案を担う","データサイエンティストは、データの分析、モデルの構築、分析結果の共有などを担う"],a:2,exp:"デザイナーはUIやUXの設計などを担当します。ステークホルダーのニーズを把握してプロジェクトを立案するのはマネージャーやプロジェクトマネージャーの役割です(C)。他の説明(A・B・D)は適切です。",tip:"AIを実際にビジネスに活用する際に考慮すべき内容を整理しておきましょう。"},
{id:63,ch:"第7章 AIの社会実装に向けて",q:"AIシステムをサービスとして提供する際には、（ア）と呼ばれるコンピュータ環境を使用することがある。（ア）を用いることで、インターネットを通じてモデルの学習や予測に必要な計算リソースを必要な量だけ利用できる。AIの予測結果をユーザーに提供する際には、（イ）が用いられることが多い。（イ）は、インターネットを介してシステム間でデータの受け渡しを行う代表的な仕組みである。",c:["（ア）クラウド（イ）Web GUI","（ア）クラウド（イ）Web API","（ア）エッジ（イ）Web GUI","（ア）エッジ（イ）Web API"],a:1,exp:"AIシステム提供にはクラウド(ア)環境が広く使われます。予測結果をシステム間でやり取りする仕組みとしてWeb API(イ)が一般的です(B)。Web GUIはコンピュータ操作のための視覚的インターフェースです。",tip:"インターネットを介したAIシステムの構築に関するキーワードを覚えておきましょう。"},
{id:64,ch:"第7章 AIの社会実装に向けて",q:"機械学習モデルの開発環境に関する以下の文章を読み、空欄（ア）〜（ウ）に入る最も適切な語句の組み合わせを選べ。（ア）は、機械学習モデルを開発する際に最もよく利用されるプログラミング言語である。ブラウザ上でのコードの編集や実行を手軽に行うことのできるツールとして（イ）がある。また、開発環境と実運用環境を揃え、実運用環境と開発環境のギャップを解消するためのツールとしては、（ウ）が利用されることが多い。",c:["（ア）Python（イ）Emacs（ウ）pyenv","（ア）Java（イ）Emacs（ウ）Docker","（ア）Python（イ）Jupyter Notebook（ウ）Docker","（ア）Java（イ）Jupyter Notebook（ウ）pyenv"],a:2,exp:"機械学習で最もよく使われるのはPython(ア)です。ブラウザ上でコード実行ができるツールはJupyter Notebook(イ)です。環境の仮想化によって開発と本番環境のギャップを解消するのはDockerなどのコンテナ技術(ウ)です(C)。",tip:"機械学習の開発に使用されるツールや環境について理解しておきましょう。"},
{id:65,ch:"第7章 AIの社会実装に向けて",q:"教師あり学習において、人がデータに正解ラベルを付与することを（ア）という。",c:["アノテーション","メタデータ","アンサンブル","バリデーション"],a:0,exp:"アノテーションとは、教師あり学習において、データに正解ラベルを付与する作業のことです(A)。たとえば、ある製品に「ヒビがあるか否か」を人間が判断してラベルを付けます。",tip:"アノテーションの役割を理解しておきましょう。特に、AIを活用してビジネス課題を解決する際には、アノテーションが必要になる場合が多くあります。"},
{id:66,ch:"第7章 AIの社会実装に向けて",q:"オープンデータセットとは、インターネット上で公開されたデータセットであり、機械学習における学習データとして利用されることがある。画像分類タスクの学習に利用できるオープンデータセットの名称として、最も適切なものを選べ。",c:["WordNet","ImageNet","DBPedia","LibriSpeech"],a:1,exp:"ImageNetは画像分類タスクの学習に利用できる代表的なオープンデータセットです(B)。WordNetは単語の意味関係データベース(A)、DBPediaはウィキペディアの構造化データ(C)、LibriSpeechは音声認識用データセット(D)です。",tip:"機械学習で使用される代表的なオープンデータセットとその用途を覚えておきましょう。"},
// ===== 第8章 AIに必要な数理・統計知識 =====
{id:67,ch:"第8章 AIに必要な数理・統計知識",q:"サイコロを振ったときの出目のように、離散型の確率変数に対応する確率分布を離散型分布と呼ぶ。離散型分布として、最も不適切なものを選べ。",c:["ベルヌーイ分布","正規分布","二項分布","ポアソン分布"],a:1,exp:"正規分布は連続型の確率変数が従う確率分布です(B)。ベルヌーイ分布(A)・二項分布(C)・ポアソン分布(D)は離散型分布です。",tip:"離散型分布と連続型分布の種類を整理しておきましょう。"},
{id:68,ch:"第8章 AIに必要な数理・統計知識",q:"共分散や相関係数に関する説明として、最も不適切なものを選べ。",c:["相関係数は、2つの変数間の相関の程度を表す値である","共分散は、2つの変数間の相関の程度を表す値である","相関係数は、−1から1の範囲の値をとる","共分散は、−1から1の範囲の値をとる"],a:3,exp:"相関係数は−1から1の範囲の値をとります(C)。共分散は2変数間の相関の程度を表しますが(B)、その値は−1から1の範囲に限定されません(D)。共分散は単位に依存するため、標準化した指標が相関係数です。",tip:"共分散と相関係数の違いについて理解しておきましょう。"},
{id:69,ch:"第8章 AIに必要な数理・統計知識",q:"勾配降下法は、機械学習において誤差関数を最小化するために用いられる手法である。勾配降下法では、パラメータに関する（ア）を計算することで、誤差関数の値が小さくなる方向に繰り返しパラメータの更新を行う。",c:["微分","積分","移動平均","分散"],a:0,exp:"勾配降下法では損失関数のパラメータに関する微分（勾配）を計算し、損失関数が小さくなる方向にパラメータを更新します(A)。ニューラルネットワークでは誤差逆伝播法によって効率的に勾配を計算します。",tip:"勾配降下法の仕組みについて説明できるようにしておきましょう。"},
{id:70,ch:"第8章 AIに必要な数理・統計知識",q:"自己情報量と相互情報量について、空欄（ア）に入る語句として最も適切なものを選べ。自己（ア）は、起こる確率が低い事象ほど大きな値をとる量である。また、相互（ア）は、ある2つの事象において、どちらか一方を知ることで、もう一方の情報がどれほど得られるかを表す量である。",c:["エントロピー","情報量","ビット","相関"],a:1,exp:"自己情報量は起こる確率が低い事象ほど大きな値をとる量です。相互情報量は2つの事象間で一方を知ることでもう一方についての情報がどれほど得られるかを表します(B)。",tip:"情報理論の基本概念について整理しておきましょう。"},
{id:71,ch:"第8章 AIに必要な数理・統計知識",q:"ロジスティック回帰でパラメータを最適化する際に使用される手法として、最も適切なものを選べ。",c:["最小二乗法","最大二乗法","最頻値法","最尤法"],a:3,exp:"ロジスティック回帰のパラメータ最適化には最尤法（最尤推定法）が使用されます(D)。最尤法は観測データが得られる確率（尤度）を最大化するようにパラメータを推定する手法です。最小二乗法は線形回帰に使用されます(A)。",tip:"ロジスティック回帰とその最適化手法について理解しておきましょう。"},
// ===== 第9章 AIに関する法律と契約 =====
{id:72,ch:"第9章 AIに関する法律と契約",q:"個人情報保護法に関する以下の記述を読み、空欄（ア）（イ）に入る語句として最も適切な組み合わせを選べ。仮名加工情報とは、個人情報に含まれる記述の一部に削除などの加工を施すことで、特定の個人を（ア）できないようにした情報のことです。（イ）とは、他の情報の照合なしに特定の個人を識別できないようにした情報のことです。",c:["（ア）識別（イ）匿名加工情報","（ア）識別（イ）仮名加工情報","（ア）追跡（イ）匿名加工情報","（ア）追跡（イ）仮名加工情報"],a:0,exp:"仮名加工情報は個人情報に加工を施し特定の個人を識別(ア)できないようにした情報です。匿名加工情報(イ)は他情報との照合なしに個人を識別できないようにした情報です(A)。仮名加工情報より匿名加工情報の方が匿名性が高くなります。",tip:"仮名加工情報、匿名加工情報の概要を理解しておきましょう。"},
{id:73,ch:"第9章 AIに関する法律と契約",q:"以下の文章を読み、空欄（ア）（イ）に入る語句として最も適切な組み合わせを選べ。2018年に施行されたEU内の個人データ保護に関する規則で、（ア）は日本の事業者に対して適用されることが（イ）。",c:["（ア）GDPR（イ）ある","（ア）GDPR（イ）ない","（ア）GLUE（イ）ある","（ア）GLUE（イ）ない"],a:0,exp:"GDPRはEU内の個人データ保護に関する規則で、EUの居住者のデータを扱う事業者には日本企業も含め適用される場合があります（ある）(A)。GLUEは自然言語処理の評価ベンチマークです。",tip:"個人データ、保有個人データの定義を覚えておきましょう。"},
{id:74,ch:"第9章 AIに関する法律と契約",q:"AIやデータの利活用時には、著作権法を遵守する必要がある。著作権法に関する説明として、最も不適切なものを選べ。",c:["Text-to-Imageモデルにおいて、ありふれた短文を入力して得られた生成画像は、その短文を入力した人の著作物にはあたらない","情報解析を目的として著作物を利用するとき、それが営利目的であれば、いかなる場合も著作権者に無断で利用することはできない","生成AIによって既存の著作物を模した作品を生成し、その作品をもとの著作物の著作権者に無断で販売したとき、その作品にもとの著作物の創作的表現が残っている場合は著作権侵害になり得る","生成AIを利用する際に、その生成AIの利用規約により、著作権法とは別に生成物の利用範囲が制限されることがある"],a:1,exp:"著作権法第30条の4において、情報解析を目的とした著作物の利用は、営利目的であっても原則として著作権者の許可なく利用できる場合があります(B)。これは最も不適切な説明です。",tip:"AIやデータを利活用する際の著作権法上の留意点を整理しておきましょう。"},
{id:75,ch:"第9章 AIに関する法律と契約",q:"AIに関連するソフトウェア開発を委託する際の契約に関する以下の文章を読み、空欄（ア）〜（ウ）に入る語句として最も適切な組み合わせを選べ。（ア）契約は、具体的な仕事の完成を目的とした契約である。一方、（イ）契約は、検証や開発といった役務の提供を目的とする契約である。（ウ）契約はAIに関連する開発では一般的に準委任契約が多い。",c:["（ア）請負（イ）準委任（ウ）準委任","（ア）請負（イ）準委任（ウ）請負","（ア）準委任（イ）請負（ウ）準委任","（ア）準委任（イ）請負（ウ）請負"],a:0,exp:"請負契約(ア)は仕事の完成を目的とし、準委任契約(イ)は役務の提供を目的とします。AI開発では学習済みモデルの精度や未知データへの挙動を保証することが難しいため、準委任契約(ウ)が多く採用されます(A)。",tip:"請負契約と準委任契約の違いを理解しておきましょう。"},
// ===== 第10章 AI倫理・AIガバナンス =====
{id:76,ch:"第10章 AI倫理・AIガバナンス",q:"AIガバナンスに関連するリスクベースアプローチ、ハードロー、ソフトローといった概念の理解を問う問題です。AIガバナンスの設計にあたっては、AIに関連する新たな規制を設ける必要があります。そこで国際的に広く普及しつつある考え方としてリスクベースアプローチがあります。リスクベースアプローチとして最も適切なものを選べ。",c:["規制の程度をリスクの大きさに対応させるべきという考え方","データベースアプローチという用語は一般的に使用されない","国家などで明確に法律による規制をハードロー、私的な取り決めなどによる自主的な規制をソフトローと呼ぶ","AIガバナンスにおいてハードローとソフトローはいずれも、規制の程度をリスクの大きさに対応させるべきという考え方である"],a:0,exp:"リスクベースアプローチとは、規制の程度をリスクの大きさに対応させるべきという考え方です(A)。ハードローは法律による規制、ソフトローは自主的規制を指します(C)。AIガバナンスの設計ではハードローとソフトローを組み合わせることが多いです。",tip:"AIガバナンスの概要とその設計に関連する考え方を理解しておきましょう。"},
{id:77,ch:"第10章 AI倫理・AIガバナンス",q:"機械学習モデルの公平性に関する以下の文章を読み、空欄（ア）（イ）に入る語句として最も適切な組み合わせを選べ。（ア）とは、人種や国籍などのように、差別や偏見が生じないように注意して扱うべき情報である。また（イ）は、（ア）と相関が強いことなどにより、それを代替し得るデータである。（ア）や（イ）を特徴量として使用することで、公平ではない予測を行う学習済みモデルができ上がってしまう場合がある。",c:["（ア）センシティブ情報（イ）代理変数","（ア）センシティブ情報（イ）潜在変数","（ア）匿名加工情報（イ）代理変数","（ア）匿名加工情報（イ）潜在変数"],a:0,exp:"差別や偏見が生じないように注意して扱うべき情報をセンシティブ情報(ア)と呼びます。センシティブ情報と強く相関しそれを代替し得るデータを代理変数(イ)と呼びます(A)。",tip:"機械学習において問題となる公平性の概要や関連するキーワードを覚えておきましょう。"},
{id:78,ch:"第10章 AI倫理・AIガバナンス",q:"A社は、履歴書をアルゴリズムによって審査し、応募者にスコアを付けるシステムを開発していたが、特定の職種で女性に不利なスコアが付きやすい傾向があることが発覚し、開発を中止した。このように、アルゴリズムが特定の属性に対して偏った結果を出力してしまうことを指す用語として、最も適切なものを選べ。",c:["アルゴリズムバリアンス","アルゴリズムバイアス","サンプリングバリアンス","サンプリングバイアス"],a:1,exp:"アルゴリズムバイアスとは、機械学習などを含むアルゴリズムが特定の属性に対して偏った結果を出力してしまうことです(B)。本問のように収集データの量が特定属性に偏っていることでアルゴリズムバイアスが発生することがあります。",tip:"アルゴリズムバイアスやサンプリングバイアスといった公平性の問題に関するキーワードを覚えておきましょう。"},
{id:79,ch:"第10章 AI倫理・AIガバナンス",q:"画像に対して人間には知覚できない程度のノイズを付加することで、画像分類モデルの予測を誤らせることができる場合がある。このように、機械学習モデルの予測を誤らせる目的で作られた入力データを指す用語として、最も適切なものを選べ。",c:["Atrous Example","Attention Example","Adversarial Example","Annotation Example"],a:2,exp:"Adversarial Example（敵対的サンプル）は、機械学習モデルの予測を誤らせる目的で意図的に作成された入力データです(C)。人間には知覚できないわずかなノイズを加えることで分類モデルを騙すことができます。",tip:"機械学習において問題となる公平性の概要や関連するキーワードを覚えておきましょう。"},
{id:80,ch:"第10章 AI倫理・AIガバナンス",q:"情報発信サービスなどでは、アルゴリズムがユーザーの行動履歴を分析または学習し、ユーザーの見たい情報を優先的に表示する一方、ユーザーの価値観に沿わない情報を遮断することがある。このような情報環境を指す用語として、最も適切なものを選べ。",c:["エコーチェンバー","フィルターバブル","ディープフェイク","レコメンデーション"],a:1,exp:"フィルターバブルとは、アルゴリズムがユーザーの行動履歴を学習し個人の価値観に沿った情報のみを優先表示することで、自身の価値観の中に閉じてしまうような情報環境のことです(B)。エコーチェンバーも関連する概念で、ソーシャルメディアで同じ意見が反響し合う環境を指します。",tip:"情報発信の場でのAIと関連する概念について整理しておきましょう。"},
{id:81,ch:"第10章 AI倫理・AIガバナンス",q:"AIの利活用が雇用に及ぼす影響についての説明として、最も適切なものを選べ。",c:["AIに代替され得る仕事は、繰り返し行う必要のある定型業務のみである","AIの活用によって労働力不足が解消される可能性はあるが、新たな雇用が創出されることはない","AIに代替された仕事では、その仕事のスキルを持つ人材が社会からいなくなることが問題になり得る","AIに一度代替された仕事では、AIの挙動をモニタリングする必要はない"],a:2,exp:"AIに代替された仕事のスキルを持つ人材が社会からいなくなることが問題になり得ます(C)。AIは定型業務以外にも多くの業務を代替し得ます(A)。新たな雇用も創出される可能性があります(B)。AIのモニタリングは継続的に必要です(D)。",tip:"AIの利活用が雇用に及ぼす影響について多角的に理解しておきましょう。"},
{id:82,ch:"第10章 AI倫理・AIガバナンス",q:"AIに関連する倫理的な課題を解決するための方策についての記述として、最も不適切なものを選べ。",c:["AIに倫理上の問題がないか調査するために、AI倫理アセスメントを外部の専門家に委託する","AIの出力に再現性をもたせ、入出力の履歴を適切に管理することで、追跡可能性や監査可能性を担保する","ダイバーシティやインクルージョンを確保するため、AI開発者の出身や経歴をできるだけ揃える","センシティブ情報やその代理変数が特徴量に含まれていないか検証する"],a:2,exp:"ダイバーシティ（多様性）やインクルージョンを確保するためには、AI開発者の出身や経歴を揃えるのではなく、多様な背景を持つ人材を集めることが重要です(C)。A・B・Dは適切な倫理的取り組みです。",tip:"AIを利活用する際に透明性を確保することは重要です。そのために考慮すべき事項を整理しておきましょう。"},
];

// ============================================================
// STATE
// ============================================================
const STATE = {
  screen: 'home',   // home|quiz|score|weaklist
  mode: null,       // all|random|weak|chapter
  chapterFilter: null,
  questions: [],    // current question set
  current: 0,
  answered: false,
  selected: -1,
  score: 0,
  wrongIds: new Set(),  // session wrong
  history: {},      // id -> {wrong:n, correct:n} stored in localStorage
};

function loadHistory() {
  try {
    const d = localStorage.getItem('gk_history');
    if (d) STATE.history = JSON.parse(d);
  } catch(e) { STATE.history = {}; }
}

function saveHistory() {
  try {
    localStorage.setItem('gk_history', JSON.stringify(STATE.history));
  } catch(e) {}
}

function getWeakIds() {
  return Object.entries(STATE.history)
    .filter(([id, v]) => v.wrong > 0)
    .sort(([,a],[,b]) => b.wrong - a.wrong)
    .map(([id]) => parseInt(id));
}

function getTotalAnswered() {
  return Object.keys(STATE.history).length;
}

function getTotalCorrect() {
  return Object.values(STATE.history).filter(v => v.correct > 0 && v.wrong === 0).length;
}

function getWeakCount() {
  return getWeakIds().length;
}

// ============================================================
// CHAPTERS
// ============================================================
const CHAPTERS = [...new Set(QDB.map(q => q.ch))];

// ============================================================
// RENDER
// ============================================================
const $ = id => document.getElementById(id);
const app = document.getElementById('app');

function render() {
  switch(STATE.screen) {
    case 'home':    renderHome(); break;
    case 'quiz':    renderQuiz(); break;
    case 'score':   renderScore(); break;
    case 'weaklist':renderWeakList(); break;
  }
}

  loadHistory();
  const totalQ = QDB.length;
  const answered = getTotalAnswered();
  const correct = getTotalCorrect();
  const weak = getWeakCount();

  app.innerHTML = `
<div class="topbar">
  <div class="topbar-title">📘 G検定 問題集</div>
  <div class="topbar-badge">全${totalQ}問</div>
</div>
<div class="home">
  <div class="home-hero">
    <h1>徹底攻略 G検定</h1>
    <p>ディープラーニングG検定ジェネラリスト問題集 第3版</p>
    <div class="home-stats">
      <div class="stat-card"><div class="stat-num">${totalQ}</div><div class="stat-lbl">総問題数</div></div>
      <div class="stat-card"><div class="stat-num">${answered}</div><div class="stat-lbl">回答済み</div></div>
      <div class="stat-card"><div class="stat-num">${weak}</div><div class="stat-lbl">苦手問題</div></div>
    </div>
  </div>

  <div class="section-title">学習モード</div>
  <div class="mode-cards">
    <button class="mode-card mode-all" onclick="startMode('all')">
      <div class="mode-icon">📝</div>
      <div class="mode-info">
        <h3>全問題モード</h3>
        <p>全${totalQ}問を順番に解く</p>
      </div>
    </button>
    <button class="mode-card mode-random" onclick="startMode('random')">
      <div class="mode-icon">🎲</div>
      <div class="mode-info">
        <h3>ランダム出題モード</h3>
        <p>全問題からランダムに20問出題</p>
      </div>
    </button>
    <button class="mode-card mode-weak" onclick="${weak > 0 ? "startMode('weak')" : "alert('苦手問題はまだありません。問題を解いてから挑戦してください！')"}">
      <div class="mode-icon">🎯</div>
      <div class="mode-info">
        <h3>苦手問題復習モード</h3>
        <p>${weak > 0 ? `不正解の${weak}問を重点復習` : '問題を解くと苦手問題が追加されます'}</p>
      </div>
    </button>
    <button class="mode-card mode-chapter" onclick="showChapters()">
      <div class="mode-icon">📚</div>
      <div class="mode-info">
        <h3>章別モード</h3>
        <p>特定の章を集中して練習</p>
      </div>
    </button>
  </div>

  <div class="section-title" id="ch-section-title" style="display:none">章を選択</div>
  <div class="chapter-list" id="chapter-list" style="display:none">
    ${CHAPTERS.map((ch,i) => {
      const qs = QDB.filter(q => q.ch === ch);
      const chWeak = qs.filter(q => STATE.history[q.id]?.wrong > 0).length;
      return `<div class="ch-item" onclick="startMode('chapter','${ch.replace(/'/g,"\\'")}')">
        <div class="ch-num">Ch${i+1}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.replace(/第\d+章\s/,'')}</div>
          <div class="ch-meta">${qs.length}問${chWeak > 0 ? ` ・ 苦手${chWeak}問` : ''}</div>
        </div>
        <div class="ch-arrow">›</div>
      </div>`;
    }).join('')}
  </div>
</div>`;
}

function showChapters() {
  const list = $('chapter-list');
  const title = $('ch-section-title');
  const show = list.style.display === 'none';
  list.style.display = show ? 'flex' : 'none';
  list.style.flexDirection = 'column';
  title.style.display = show ? 'block' : 'none';
  if (show) list.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function startMode(mode, chapter=null) {
  loadHistory();
  STATE.mode = mode;
  STATE.chapterFilter = chapter;
  STATE.current = 0;
  STATE.answered = false;
  STATE.selected = -1;
  STATE.score = 0;
  STATE.wrongIds = new Set();

  let pool = [...QDB];
  if (mode === 'chapter' && chapter) {
    pool = QDB.filter(q => q.ch === chapter);
  } else if (mode === 'weak') {
    const weakIds = getWeakIds();
    pool = QDB.filter(q => weakIds.includes(q.id));
    if (pool.length === 0) { alert('苦手問題はありません。'); return; }
  }

  if (mode === 'random') {
    pool = shuffle([...pool]).slice(0, 20);
  } else if (mode === 'weak') {
    pool = shuffle([...pool]);
  }

  STATE.questions = pool;
  STATE.screen = 'quiz';
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuiz() {
  const q = STATE.questions[STATE.current];
  const total = STATE.questions.length;
  const pct = Math.round(((STATE.current + 1) / total) * 100);
  const LABELS = ['A','B','C','D'];
  const modeLabel = {all:'全問題',random:'ランダム',weak:'苦手復習',chapter:'章別'}[STATE.mode];
  const tagMode = STATE.mode === 'weak'
    ? `<span class="tag tag-weak">🎯 苦手復習</span>`
    : `<span class="tag tag-mode">${modeLabel}</span>`;

  app.innerHTML = `
<div class="topbar">
  <button class="topbar-back" onclick="goHome()">←</button>
  <div class="topbar-title">G検定 問題集</div>
  <div class="topbar-badge">${STATE.current+1} / ${total}</div>
</div>
<div class="quiz-header">
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span class="prog-text">${pct}%</span>
  </div>
  <div class="quiz-tags">
    <span class="tag tag-chapter">${q.ch}</span>
    ${tagMode}
  </div>
</div>
<div class="quiz-body">
  <div class="q-number">問 ${STATE.current + 1}</div>
  <div class="q-text">${q.q}</div>
  <div class="choices" id="choices">
    ${q.c.map((c,i) => `
    <button class="choice-btn${STATE.answered ? ' answered' : ''}" id="choice-${i}" onclick="selectAnswer(${i})">
      <span class="choice-lbl">${LABELS[i]}</span>
      <span class="choice-text">${c}</span>
    </button>`).join('')}
  </div>
  <div id="result-area"></div>
</div>
<div class="quiz-nav">
  <button class="btn-skip" onclick="skipQ()">スキップ</button>
  <button class="btn-next" id="next-btn" onclick="nextQ()" disabled>${STATE.current + 1 >= total ? '結果を見る' : '次の問題 →'}</button>
</div>`;

  if (STATE.answered) restoreAnswer();
}

function selectAnswer(i) {
  if (STATE.answered) return;
  STATE.answered = true;
  STATE.selected = i;
  const q = STATE.questions[STATE.current];
  const correct = q.a;
  const isCorrect = i === correct;
  const LABELS = ['A','B','C','D'];

  if (isCorrect) {
    STATE.score++;
    if (!STATE.history[q.id]) STATE.history[q.id] = {wrong:0,correct:0};
    STATE.history[q.id].correct++;
  } else {
    STATE.wrongIds.add(q.id);
    if (!STATE.history[q.id]) STATE.history[q.id] = {wrong:0,correct:0};
    STATE.history[q.id].wrong++;
  }
  saveHistory();

  for (let idx = 0; idx < q.c.length; idx++) {
    const el = $(`choice-${idx}`);
    el.classList.add('answered');
    if (idx === correct) el.classList.add('correct');
    else if (idx === i && !isCorrect) el.classList.add('wrong');
    else el.classList.add('dimmed');
  }

  const resultArea = $('result-area');
  resultArea.innerHTML = `
<div class="result-panel">
  <div class="result-header ${isCorrect?'ok':'ng'}">
    <span class="result-icon">${isCorrect ? '✓' : '✗'}</span>
    <span class="result-verdict ${isCorrect?'ok':'ng'}">${isCorrect ? '正解！' : '不正解'}</span>
    <span class="result-correct-ans">正解：<span>${LABELS[correct]}</span></span>
  </div>
  <div class="result-body">
    <div class="exp-title">解 説</div>
    <div class="exp-text">${q.exp}</div>
    ${q.tip ? `<div class="exp-tip"><p>📌 試験対策：${q.tip}</p></div>` : ''}
  </div>
</div>`;

  $('next-btn').disabled = false;
  resultArea.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function restoreAnswer() {
  if (STATE.selected < 0) return;
  const q = STATE.questions[STATE.current];
  const correct = q.a;
  for (let idx = 0; idx < q.c.length; idx++) {
    const el = $(`choice-${idx}`);
    el.classList.add('answered');
    if (idx === correct) el.classList.add('correct');
    else if (idx === STATE.selected && STATE.selected !== correct) el.classList.add('wrong');
    else el.classList.add('dimmed');
  }
  if (STATE.selected >= 0) {
    $('next-btn').disabled = false;
  }
}

function nextQ() {
  if (!STATE.answered) return;
  STATE.current++;
  STATE.answered = false;
  STATE.selected = -1;
  if (STATE.current >= STATE.questions.length) {
    STATE.screen = 'score';
  }
  render();
}

function skipQ() {
  STATE.current++;
  STATE.answered = false;
  STATE.selected = -1;
  if (STATE.current >= STATE.questions.length) {
    STATE.screen = 'score';
  }
  render();
}

function renderScore() {
  const total = STATE.questions.length;
  const score = STATE.score;
  const pct = total > 0 ? Math.round(score / total * 100) : 0;
  const wrong = STATE.wrongIds.size;
  const skipped = total - score - wrong;

  let grade, gradeClass;
  if (pct >= 90) { grade = 'S ランク 🏆'; gradeClass = 'S'; }
  else if (pct >= 75) { grade = 'A ランク 🥇'; gradeClass = 'A'; }
  else if (pct >= 60) { grade = 'B ランク 🥈'; gradeClass = 'B'; }
  else if (pct >= 40) { grade = 'C ランク 🥉'; gradeClass = 'C'; }
  else { grade = 'D ランク 📖'; gradeClass = 'D'; }

  const r = 52;
  const circ = 2 * Math.PI * r;
  const dash = circ * pct / 100;

  app.innerHTML = `
<div class="topbar">
  <div class="topbar-title">G検定 問題集</div>
</div>
<div class="score-screen">
  <div class="score-ring">
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="${r}" fill="none" stroke="#e8eaf6" stroke-width="10"/>
      <circle cx="60" cy="60" r="${r}" fill="none" stroke="#3949ab" stroke-width="10"
        stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
        stroke-linecap="round"/>
    </svg>
    <div class="score-ring-text">
      <span class="score-ring-num">${score}</span>
      <span class="score-ring-den">/ ${total}</span>
    </div>
  </div>
  <div class="score-grade ${gradeClass}">${grade}</div>
  <div class="score-sub">正答率 ${pct}%</div>
  <div class="score-grid">
    <div class="score-card"><div class="sc-label">✓ 正解</div><div class="sc-val green">${score}問</div></div>
    <div class="score-card"><div class="sc-label">✗ 不正解</div><div class="sc-val red">${wrong}問</div></div>
    <div class="score-card"><div class="sc-label">→ スキップ</div><div class="sc-val">${skipped}問</div></div>
    <div class="score-card"><div class="sc-label">📊 正答率</div><div class="sc-val">${pct}%</div></div>
  </div>
  <div class="score-btns">
    <button class="score-btn-primary" onclick="retryMode()">もう一度挑戦する</button>
    ${wrong > 0 ? `<button class="score-btn-secondary" onclick="retryWrong()">🎯 間違えた問題を復習 (${wrong}問)</button>` : ''}
    <button class="score-btn-secondary" onclick="goHome()">🏠 ホームへ戻る</button>
  </div>
</div>`;
}

function retryMode() {
  startMode(STATE.mode, STATE.chapterFilter);
}

function retryWrong() {
  const wrongQs = STATE.questions.filter(q => STATE.wrongIds.has(q.id));
  STATE.questions = shuffle([...wrongQs]);
  STATE.current = 0;
  STATE.answered = false;
  STATE.selected = -1;
  STATE.score = 0;
  STATE.wrongIds = new Set();
  STATE.screen = 'quiz';
  STATE.mode = 'weak';
  render();
}

function renderWeakList() {
  loadHistory();
  const weakIds = getWeakIds();
  const weakQs = weakIds.map(id => QDB.find(q => q.id === id)).filter(Boolean);

  app.innerHTML = `
<div class="topbar">
  <button class="topbar-back" onclick="goHome()">←</button>
  <div class="topbar-title">苦手問題一覧</div>
  <div class="topbar-badge">${weakQs.length}問</div>
</div>
<div class="weak-screen">
  ${weakQs.length === 0 ? `
  <div class="no-weak">
    <div class="no-weak-icon">🎉</div>
    <p>苦手問題はありません！<br>問題を解いて間違えると<br>ここに追加されます。</p>
  </div>` : `
  <div class="weak-count">不正解が記録された問題が${weakQs.length}問あります</div>
  ${weakQs.map(q => {
    const h = STATE.history[q.id] || {wrong:0,correct:0};
    return `<div class="weak-item" onclick="startWeakSingle(${q.id})">
      <div class="weak-badge">✗${h.wrong}</div>
      <div>
        <div class="weak-q">${q.q.length > 60 ? q.q.slice(0,60)+'…' : q.q}</div>
        <div class="weak-ch">${q.ch}</div>
      </div>
    </div>`;
  }).join('')}`}
</div>`;
}

function startWeakSingle(id) {
  const q = QDB.find(q => q.id === id);
  if (!q) return;
  STATE.mode = 'weak';
  STATE.questions = [q];
  STATE.current = 0;
  STATE.answered = false;
  STATE.selected = -1;
  STATE.score = 0;
  STATE.wrongIds = new Set();
  STATE.screen = 'quiz';
  render();
}

function goHome() {
  STATE.screen = 'home';
  render();
}

// ============================================================
// INIT
// ============================================================
loadHistory();
render();
</script>
</body>
</html>
